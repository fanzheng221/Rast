name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  prepare:
    name: Resolve release ref
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_ref: ${{ steps.meta.outputs.release_ref }}
    steps:
      - name: Resolve release metadata
        id: meta
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            if [ -z "$TAG" ]; then
              echo "Input tag is required for workflow_dispatch." >&2
              exit 1
            fi
            echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "release_ref=refs/tags/$TAG" >> "$GITHUB_OUTPUT"
          else
            echo "release_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "release_ref=${GITHUB_REF}" >> "$GITHUB_OUTPUT"
          fi

  build-binaries:
    name: Build ${{ matrix.settings.target }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-15-intel
            target: x86_64-apple-darwin
          - host: macos-15
            target: aarch64-apple-darwin
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - host: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            packages/bindings -> target
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build bindings
        run: pnpm --filter @rast/bindings exec napi build --release --platform --target ${{ matrix.settings.target }}
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: packages/bindings/*.node
          if-no-files-found: error

  publish:
    name: Publish npm and GitHub Release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-binaries
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bindings-*
          merge-multiple: true
          path: packages/bindings/release-artifacts
      - name: Merge binaries into publish package
        run: cp packages/bindings/release-artifacts/*.node packages/bindings/
      - name: Generate checksum
        run: |
          cd packages/bindings/release-artifacts
          shasum -a 256 *.node > SHA256SUMS.txt
      - name: Publish packages to npm
        run: pnpm release
        env:
          NPM_CONFIG_PROVENANCE: "true"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          generate_release_notes: true
          files: |
            packages/bindings/release-artifacts/*.node
            packages/bindings/release-artifacts/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

[package]
name = "rast-cli"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "rast"
path = "src/main.rs"

[dependencies]
ast_engine.workspace = true
oxc.workspace = true
clap = { version = "4.4", features = ["derive"] }
regex = "1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"

[dev-dependencies]
tempfile = "3.13"
